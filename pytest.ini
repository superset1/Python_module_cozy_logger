[pytest]
addopts = -v
          --cov=cozy_logger
          --cov-report=term-missing
          --cov-report=html
          --cov-fail-under=90
          --tb=short
          -p no:warnings
          --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = .git .env .venv dist build *.egg-info
markers =
    smoke: минимальная проверка работоспособности (критические тесты)
    unit: быстрые изолированные тесты без внешних зависимостей
    integration: тесты взаимодействующие с файловой системой
    filesystem: тесты которые читают/пишут файлы
    regression: тесты на регрессию и сложные сценарии
    slow: тесты которые выполняются долго (потенциально)
    stress: стресс-тесты с высокой нагрузкой
